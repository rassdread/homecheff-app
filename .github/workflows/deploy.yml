# -----------------------------------------------------------------------------
# Deploy naar Vercel — HANDMATIGE BACKUP / NOODREM
# -----------------------------------------------------------------------------
#
# Bron van waarheid voor production: Vercel native Git integration
# (repo gekoppeld in Vercel → push naar production branch triggert build/deploy).
#
# Deze workflow draait NIET automatisch bij elke push, om te voorkomen dat je
# twee keer naar production deployt (Vercel + deze action tegelijk).
#
# Gebruik: GitHub → Actions → "Deploy to Vercel" → Run workflow
# Vereist secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# -----------------------------------------------------------------------------

name: Deploy to Vercel (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
